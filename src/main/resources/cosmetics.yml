# Cosmetics Configuration
# permission supports any Bukkit permission node checked by LuckPerms.
# Examples:
#   permission: "bridgefight.cosmetics.vip"
#   permission: "group.vip"
# Empty permission means no permission requirement.
kill_messages:
  default:
    display_name: "&7Default"
    required_balance: 0
    permission: ""
    message: "&e{victim} &7was killed by &e{killer}&7."
    void_message: "&e{victim} &7was sent into the void by &e{killer}&7."
  fire:
    display_name: "&cFire"
    required_balance: 100
    permission: "bridgefight.cosmetics.kill_messages.fire"
    message: "&e{victim} &7was burnt to a crisp by &e{killer}&7."
    void_message: "&e{victim} &7was knocked into the fire pits by &e{killer}&7."
  abyss:
    display_name: "&bAbyss"
    required_balance: 250
    permission: "bridgefight.cosmetics.kill_messages.abyss"
    message: "&e{victim} &7was sent to the abyss by &e{killer}&7."
    void_message: "&e{victim} &7was consumed by the void thanks to &e{killer}&7."

