name: BridgeFightPlugin
version: '2.3.1'
main: me.molfordan.bridgefightplugin.BridgeFightPlugin
api-version: '1.8'
softdepend:
  - PlaceholderAPI
  - WorldGuard
  - ProtocolLib
commands:
  arenamap:
    usage: '/arenamap <create|pos1|pos2|finish|remove> <name>'
    description: 'ArenaFFAManager'
    permission: arenamap.admin
  arenabypass:
    usage: '/arenabypass'
    description: 'Arena bypass'
    permission: arenamap.admin
  commandbypass:
    usage: '/commandbypass'
    description: 'Command bypass'
    permission: arenamap.admin
  arenaconfig:
    usage: '/arenaconfig reload'
    description: 'Arena config reload'
    permission: arenamap.admin
  configreload:
    usage: '/configreload'
    description: 'Reload the configuration file'
    permission: arenamap.admin
  setlobby:
    usage: '/setlobby'
    description: 'sets a lobby'
    permission: arenamap.admin
  build:
    usage: '/build'
    description: 'Build Mode'
    permission: arenamap.admin
  buildffa:
    usage: '/buildffa'
    description: 'buildffa'
    aliases: [ffa]
  bridgefight:
    usage: '/bridgefight'
    description: 'bridgefight'
    aliases: [housing]
  syncdata:
    usage: '/syncdata'
    description: 'syncdata'
    permission: arenamap.admin
  loadworld:
    usage: '/loadworld <name> <type>'
    description: 'load worlds'
    permission: arenamap.admin
  spawn:
    usage: '/lobby'
    description: 'lobby'
  setpos1:
    usage: '/setpos1 <platform>'
    description: 'setpos1'
    permission: arenamap.admin
  setpos2:
    usage: '/setpos2 <platform>'
    description: 'setpos2'
    permission: arenamap.admin
  rc:
    usage: '/rc'
    description: 'region command'
    permission: arenamap.admin
  hotbarmanager:
    description: 'open hotbarmanager'
    usage: '/hotbarmanager'
    aliases: [hbm]
  stats:
    usage: '/stats <player>'
    description: 'stats command'
  leaderboard:
    usage: '/leaderboard'
    description: 'leaderboard command'
  guistats:
    usage: '/guistats <player>'
    description: 'guistats command'
  bridgeban:
    usage: '/bridgeban <player> [duration] [reason]'
    description: 'bridgeban command'
    permission: bridgefight.banned
  bridgeunban:
    usage: '/bridgeunban <player> [reason]'
    description: 'bridgeunban command'
    permission: bridgefight.unbanned
  guileaderboard:
    usage: '/guileaderboard'
    description: 'guileaderboard command'
  playerhistory:
    usage: '/playerhistory <player>'
    description: 'playerhistory command'
    permission: arenamap.admin
  freeze:
    usage: '/freeze <player>'
    description: 'frozen command'
    aliases: [frozen, ss]
    permission: arenamap.freeze
  unfreeze:
    usage: '/unfreeze <player>'
    description: 'unfrozen command'
    aliases: [unfrozen, unss]
    permission: arenamap.freeze
  report:
    usage: '/report <player> <reason>'
    description: 'report command'
  reports:
    usage: '/reports <page>'
    description: 'reports command'
    permission: arenamap.admin
  statsreset:
    usage: '/statsreset <player>'
    description: 'statsreset command'
    permission: arenamap.admin
  hbmresetall:
    usage: '/hbmresetall'
    description: 'reset all hotbar manager data'
    permission: arenamap.admin
  privateworld:
    usage: '/privateworld'
    description: 'privateworld command'
    permission: privateworld.access
  setstats:
    usage: '/setstats <player> <bridgefight|buildffa> <kills|deaths|streak|highest_streak> <value>'
    description: 'setstats command'
    permission: arenamap.admin
  kit:
    usage: '/kit'
    description: 'kit command'
  debugging:
    usage: '/debugging'
    description: 'debug command'
  givepots:
    usage: '/givepots <type> <amount>'
    description: 'give potions command'
    permission: arenamap.admin
  patchnotes:
    usage: '/patchnotes <all|reload|[page number]>'
    description: 'View archived patch notes'
  bedfight:
    usage: '/bedfight start <arena> <player1> <player2>'
    description: 'bedfight command'
    permission: bedfight.admin
  kiteditor:
    usage: '/kiteditor'
    description: 'Open the kit editor'
  forfeit:
    usage: '/forfeit'
    description: 'Forfeit the current BedFight match'
  leave:
    usage: '/leave'
    description: 'Leave the current BedFight match'
  spec:
    usage: '/spec <player>'
    description: 'Spectate a BedFight match'
  queue:
    usage: '/queue [leave]'
    description: 'Open the queue menu or leave queue'
  duel:
    usage: '/duel <player>'
    description: 'Duel another player'
  bfparty:
    usage: '/bfparty <create|invite|disband|leave>'
    description: 'BedFight party command'
    aliases: [bfp]
  bfknockback:
    usage: '/bfknockback reload'
    description: 'Reload knockback configuration'
    permission: arenamap.admin
  playagain:
    usage: '/playagain'
    description: 'Requeue for the last match type'
  togglebridgeegg:
    usage: '/togglebridgeegg'
    description: 'toggle bridge egg functionality'
    permission: arenamap.admin
  databasebackup:
    usage: '/databasebackup'
    description: 'Manually trigger a MySQL database backup'
    permission: arenamap.admin

permissions:
  arenamap.admin:
    description: 'ArenaFFAManager'
  privateworld.access:
    description: 'PrivateWorld Access'
  arenamap.freeze:
    description: 'ArenaFFAManager Freeze'
  bridgefight.banned:
    description: 'BridgeFight Banned'
  bridgefight.unbanned:
    description: 'BridgeFight Unbanned'